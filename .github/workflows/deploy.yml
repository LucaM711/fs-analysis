name: deploy
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    name: Release
    concurrency:
      # Only one release job at a time. Strictly sequential.
      group: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # all history

      - name: Get All Tags
        run: git fetch --tags -f

      - name: Detect Initial Commit
        id: skip_release
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore Development Environment
        run: poetry install

      - name: Get Node Version
        id: get-node-version
        run: echo version=$(jq -r .engines.node package.json) >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.get-node-version.outputs.version }}

      - name: Release
        shell: bash
        run: |
          npm install
          npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # dry run if not on main/master branch, or if initial commit
          RELEASE_DRY_RUN: ${{ steps.skip_release.outputs.skip == 'true' || (github.ref_name != 'master' && github.ref_name != 'main') }}
